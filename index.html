<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0c">
<title>advtasks</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AdvTasks">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ============ LOCK SCREEN ============ -->
<div id="lock-screen" class="lock-screen hidden">
  <div class="lock-box">
    <div class="lock-glyph">&gt;_</div>
    <div class="lock-title">advtasks locked</div>
    <input id="lock-passcode-input" class="text-input lock-input" type="password" placeholder="Enter passcode" inputmode="numeric" />
    <div id="lock-error" class="lock-error"></div>
    <button id="lock-unlock-btn" class="btn-primary lock-unlock-btn">unlock</button>
  </div>
</div>

<div id="app">

  <!-- ============ SIDEBAR ============ -->
  <aside id="sidebar">
    <div class="brand">
      <span class="brand-glyph">&gt;_</span>
      <span class="brand-name">advtasks</span>
      <button id="sidebar-collapse-btn" class="icon-btn only-mobile" aria-label="Close menu">✕</button>
    </div>

    <nav class="side-nav">
      <button class="side-nav-item" data-view="dashboard" id="nav-dashboard">
        <span class="dot dot-dash"></span> Dashboard
      </button>
      <button class="side-nav-item" data-view="board" data-board="inbox" id="nav-inbox">
        <span class="dot dot-inbox"></span> Inbox
      </button>
    </nav>

    <div class="side-section-label">boards</div>
    <nav class="side-nav" id="board-nav"><!-- populated by JS --></nav>

    <button id="new-board-btn" class="side-action">+ new board</button>

    <div class="sidebar-footer">
      <button id="app-lock-btn" class="side-action ghost">App lock</button>
      <button id="export-btn" class="side-action ghost" title="Export all data to a JSON file">Export data</button>
      <label id="import-btn" class="side-action ghost" title="Import a previously exported JSON file">
        Import data
        <input type="file" id="import-file" accept="application/json" hidden>
      </label>
      <button id="theme-toggle-btn" class="side-action ghost">Light mode</button>
      <div class="footer-hint">offline · local only</div>
    </div>
  </aside>

  <div id="sidebar-scrim"></div>

  <!-- ============ MAIN ============ -->
  <main id="main">
    <header id="topbar">
      <button id="menu-btn" class="icon-btn only-mobile" aria-label="Open menu">☰</button>
      <h1 id="board-title" contenteditable="false">board</h1>
      <div class="view-toggle" id="view-toggle">
        <button class="view-toggle-btn active" data-mode="board">board</button>
        <button class="view-toggle-btn" data-mode="table">table</button>
        <button class="view-toggle-btn" data-mode="calendar">calendar</button>
      </div>
      <div class="topbar-spacer"></div>
      <button id="filter-btn" class="icon-btn" title="Filter cards">⚑</button>
      <button id="board-settings-btn" class="icon-btn" title="Board settings">⚙</button>
      <button id="search-btn" class="icon-btn" title="Search (Ctrl/Cmd+K)">⌕</button>
      <button id="quick-add-btn" class="btn-primary">+ card</button>
    </header>

    <div id="filter-bar" class="filter-bar hidden">
      <input id="filter-text" class="text-input filter-text-input" placeholder="Filter by title or tag…" />
      <div id="filter-labels" class="filter-labels"></div>
      <button id="filter-clear-btn" class="side-action ghost small">clear</button>
    </div>

    <section id="board-view"><!-- columns injected by JS --></section>
    <section id="table-view-container" hidden></section>
    <section id="calendar-view-container" hidden></section>

    <section id="dashboard-view" hidden><!-- stats injected by JS --></section>
  </main>
</div>

<!-- ============ CARD MODAL ============ -->
<div id="card-modal" class="modal-backdrop hidden">
  <div class="modal card-modal">
    <div class="modal-head">
      <input id="card-title-input" class="card-title-input" placeholder="Card title" />
      <button class="icon-btn" id="card-close-btn">✕</button>
    </div>
    <div class="modal-body" id="card-modal-body"><!-- injected by JS --></div>
    <div class="modal-foot">
      <button id="card-archive-btn" class="btn-danger-ghost">archive card</button>
      <div class="modal-foot-spacer"></div>
      <span class="save-hint" id="card-save-hint">saved</span>
    </div>
  </div>
</div>

<!-- ============ NEW BOARD MODAL ============ -->
<div id="board-modal" class="modal-backdrop hidden">
  <div class="modal small-modal">
    <div class="modal-head">
      <h2>new board</h2>
      <button class="icon-btn" id="board-modal-close-btn">✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">board name</label>
      <input id="new-board-name" class="text-input" placeholder="e.g. Bose bounty program" />
      <label class="field-label">template</label>
      <div id="template-grid" class="template-grid"><!-- injected by JS --></div>
    </div>
    <div class="modal-foot">
      <button id="create-board-btn" class="btn-primary">create board</button>
    </div>
  </div>
</div>

<!-- ============ BOARD SETTINGS MODAL ============ -->
<div id="board-settings-modal" class="modal-backdrop hidden">
  <div class="modal settings-modal">
    <div class="modal-head">
      <h2>board settings</h2>
      <button class="icon-btn" id="settings-close-btn">✕</button>
    </div>
    <div class="modal-body" id="settings-modal-body"><!-- injected by JS --></div>
    <div class="modal-foot">
      <button id="delete-board-btn" class="btn-danger-ghost">delete board</button>
      <div class="modal-foot-spacer"></div>
      <button id="export-csv-btn" class="side-action ghost">export CSV</button>
      <button id="view-archive-btn" class="side-action ghost">view archive</button>
    </div>
  </div>
</div>

<!-- ============ ARCHIVE MODAL ============ -->
<div id="archive-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2>archived cards</h2>
      <button class="icon-btn" id="archive-close-btn">✕</button>
    </div>
    <div class="modal-body" id="archive-modal-body"><!-- injected by JS --></div>
  </div>
</div>

<!-- ============ LOCK SETUP MODAL ============ -->
<div id="lock-setup-modal" class="modal-backdrop hidden">
  <div class="modal small-modal">
    <div class="modal-head">
      <h2>app lock</h2>
      <button class="icon-btn" id="lock-setup-close-btn">✕</button>
    </div>
    <div class="modal-body" id="lock-setup-body"><!-- injected by JS --></div>
  </div>
</div>

<!-- ============ COMMAND PALETTE ============ -->
<div id="command-palette" class="modal-backdrop hidden">
  <div class="modal palette-modal">
    <input id="palette-input" class="palette-input" placeholder="Type a command, card, or board…" autocomplete="off" />
    <div id="palette-results" class="palette-results"></div>
  </div>
</div>

<div id="toast-root"></div>

<script src="js/db.js"></script>
<script src="js/templates.js"></script>
<script src="js/migrate.js"></script>
<script src="js/lock.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/table-view.js"></script>
<script src="js/calendar-view.js"></script>
<script src="js/app.js"></script>
</body>
</html>
